<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BrowserOS - Windows 11</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/system.css">
  <link rel="stylesheet" href="css/boot.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <!-- Boot Screen -->
  <div id="boot-screen">
    <div class="boot-logo">
      <svg width="64" height="64" viewBox="0 0 88 88" fill="none">
        <path d="M0 12.402l35.687-4.86.016 34.423-35.67.203zm35.67 33.529l.022 34.453L.028 75.48.026 45.7zm4.326-39.025L87.314 0v41.527l-47.318.376zm47.329 39.349l-.011 41.34-47.318-6.678-.066-34.739z" fill="#00ADEF"/>
      </svg>
      <div class="boot-dots">
        <span></span><span></span><span></span><span></span><span></span>
      </div>
    </div>
  </div>

  <!-- Lock Screen -->
  <div id="lock-screen" style="display:none">
    <div class="lockscreen-bg"></div>
    <div class="lockscreen-content">
      <div class="lock-time" id="lock-time">00:00</div>
      <div class="lock-date" id="lock-date">Monday, January 1</div>
      <div class="lock-user">
        <div class="lock-avatar">👤</div>
        <div class="lock-username">User</div>
        <div class="lock-hint">Click to unlock</div>
      </div>
    </div>
  </div>

  <!-- Desktop -->
  <div id="desktop" style="display:none">
    <div id="wallpaper"></div>
    <div id="desktop-icons"></div>
    <div id="window-container"></div>

    <!-- Taskbar -->
    <div id="taskbar">
      <div id="taskbar-left">
        <button id="start-btn" title="Start">
          <svg width="18" height="18" viewBox="0 0 88 88" fill="none">
            <path d="M0 12.402l35.687-4.86.016 34.423-35.67.203zm35.67 33.529l.022 34.453L.028 75.48.026 45.7zm4.326-39.025L87.314 0v41.527l-47.318.376zm47.329 39.349l-.011 41.34-47.318-6.678-.066-34.739z" fill="currentColor"/>
          </svg>
        </button>
        <button id="search-btn" title="Search">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
          </svg>
          <span>Search</span>
        </button>
        <button id="taskview-btn" title="Task View">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="2" y="3" width="8" height="7" rx="1"/><rect x="14" y="3" width="8" height="7" rx="1"/>
            <rect x="2" y="14" width="8" height="7" rx="1"/><rect x="14" y="14" width="8" height="7" rx="1"/>
          </svg>
        </button>
      </div>
      <div id="taskbar-center" class="pinned-apps">
        <!-- Pinned apps injected by JS -->
      </div>
      <div id="taskbar-right">
        <div id="systray">
          <button id="network-btn" title="Network">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M1.5 8.5C5.1 4.9 10.3 3 12 3s6.9 1.9 10.5 5.5l-1.5 1.5C17.7 6.7 14.9 5 12 5s-5.7 1.7-9 5L1.5 8.5zM12 9c-2.2 0-4.2.9-5.7 2.3L4.8 9.8C6.6 8.1 9.2 7 12 7s5.4 1.1 7.2 2.8l-1.5 1.5C16.2 9.9 14.2 9 12 9zm3 5.5L12 18l-3-3.5c.8-.9 1.9-1.5 3-1.5s2.2.6 3 1.5z"/></svg>
          </button>
          <button id="volume-btn" title="Volume">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.8-1-3.3-2.5-4.1v8.2c1.5-.8 2.5-2.3 2.5-4.1z"/></svg>
          </button>
          <div id="tray-icons"></div>
        </div>
        <div id="taskbar-clock" id="clock">
          <div id="clock-time">00:00</div>
          <div id="clock-date">1/1/2024</div>
        </div>
        <button id="action-center-btn" title="Action Center">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6v-5c0-3.1-1.6-5.6-4.5-6.3V4c0-.8-.7-1.5-1.5-1.5S10.5 3.2 10.5 4v.7C7.6 5.4 6 7.9 6 11v5l-2 2v1h16v-1l-2-2z"/></svg>
        </button>
        <button id="show-desktop-btn" title="Show Desktop"></button>
      </div>
    </div>

    <!-- Start Menu -->
    <div id="start-menu" style="display:none">
      <div class="start-search">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" id="start-search-input" placeholder="Search for apps, settings, and documents">
      </div>
      <div class="start-pinned">
        <div class="start-section-header">
          <span>Pinned</span>
          <button class="start-all-apps-btn" id="all-apps-btn">All apps ›</button>
        </div>
        <div id="start-pinned-grid"></div>
      </div>
      <div class="start-recommended">
        <div class="start-section-header"><span>Recommended</span></div>
        <div id="start-recommended-list"></div>
      </div>
      <div class="start-footer">
        <div class="start-user">
          <span class="start-user-avatar">👤</span>
          <span class="start-user-name">User</span>
        </div>
        <button id="power-btn" title="Power">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18.36 6.64a9 9 0 1 1-12.73 0"/><line x1="12" y1="2" x2="12" y2="12"/></svg>
        </button>
      </div>
    </div>

    <!-- All Apps Menu -->
    <div id="all-apps-menu" style="display:none">
      <div class="all-apps-header">
        <button id="back-to-start-btn">← Back</button>
        <span>All apps</span>
      </div>
      <div id="all-apps-list"></div>
    </div>

    <!-- Action Center -->
    <div id="action-center" style="display:none">
      <div class="ac-quick-settings">
        <div id="ac-tiles"></div>
      </div>
      <div class="ac-sliders">
        <div class="ac-slider-row">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.8-1-3.3-2.5-4.1v8.2c1.5-.8 2.5-2.3 2.5-4.1z"/></svg>
          <input type="range" id="volume-slider" min="0" max="100" value="75">
          <span id="volume-val">75</span>
        </div>
        <div class="ac-slider-row">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="5"/><path d="M12 1v2m0 18v2M4.22 4.22l1.42 1.42m12.72 12.72 1.42 1.42M1 12h2m18 0h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
          <input type="range" id="brightness-slider" min="0" max="100" value="85">
          <span id="brightness-val">85</span>
        </div>
      </div>
      <div class="ac-notifications" id="ac-notifications">
        <div class="ac-notif-header">Notifications</div>
        <div id="notif-list"></div>
      </div>
    </div>

    <!-- Context Menu -->
    <div id="context-menu" style="display:none"></div>

    <!-- Search Overlay -->
    <div id="search-overlay" style="display:none">
      <input type="text" id="search-input" placeholder="Type to search...">
      <div id="search-results"></div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="js/kernel.js"></script>
  <script src="js/filesystem.js"></script>
  <script src="js/desktop.js"></script>
  <script src="js/taskbar.js"></script>
  <script src="js/windowmanager.js"></script>
  <script src="js/apps/fileexplorer.js"></script>
  <script src="js/apps/notepad.js"></script>
  <script src="js/apps/terminal.js"></script>
  <script src="js/apps/calculator.js"></script>
  <script src="js/apps/paint.js"></script>
  <script src="js/apps/browser.js"></script>
  <script src="js/apps/mediaplayer.js"></script>
  <script src="js/apps/settings.js"></script>
  <script src="js/apps/store.js"></script>
  <script src="js/extensions/extension-api.js"></script>
  <script src="js/boot.js"></script>
</body>
</html>
